services:
  postgres:
    image: postgres:16-alpine
    container_name: nepal-travel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nepal_travel_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nepal_travel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nepal_travel_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nepal_travel_postgres_data:
